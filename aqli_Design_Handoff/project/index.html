<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aqli — Design</title>
  <link rel="stylesheet" href="tokens.css" />
  <style>
    /* Make the canvas itself feel like the Aqli brand */
    body { background: #EDECE7; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens-app.jsx"></script>
  <script type="text/babel" src="screens-editor.jsx"></script>
  <script type="text/babel" src="screens-flow.jsx"></script>
  <script type="text/babel" src="screens-onboarding.jsx"></script>
  <script type="text/babel" src="screens-ref.jsx"></script>
  <script type="text/babel" src="screens-audit.jsx"></script>
  <script type="text/babel" src="screens-settings.jsx"></script>
  <script type="text/babel" src="screens-doc.jsx"></script>
  <script type="text/babel" src="screens-review.jsx"></script>
  <script type="text/babel" src="screens-team.jsx"></script>
  <script type="text/babel" src="screens-integrations.jsx"></script>
  <script type="text/babel" src="screens-hygiene.jsx"></script>
  <script type="text/babel" src="screens-polish.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const {
      DesignCanvas, DCSection, DCArtboard,
      Screen1_AppShell, Screen2_DocList, Screen3_Editor, Screen4_ReviewQueue,
      Screen5_Search, Screen6_DocListDark, Screen7_Empty,
      Onboarding1_SignUp, Onboarding2_Workspace, Onboarding3_Spaces,
      Onboarding4_Agent, Onboarding5_Done,
      TokensRef, ComponentsRef,
      CoverageAudit,
      Settings_General, Settings_Keys, Settings_Keys_NewDialog, Settings_Keys_RevealDialog,
      DocViewer_Approved, DocViewer_RequestReview, NewDoc_TypePicker,
      NotificationsPanel, ReviewDetail, ReviewDetail_RequestChanges,
      SignIn, InviteLanding, Settings_Members, CreateSpaceDialog, EmptySpace,
      Settings_Integrations, Settings_Integrations_Linear, VersionHistory,
      StaleDashboard, Settings_AgentActivity,
      Settings_Integrations_Slack, Settings_Integrations_GitHub, Settings_Notifications,
      ReviewDetail_Approve, ReviewDetail_Reject,
    } = window;

    function App() {
      return (
        <DesignCanvas title="Aqli — Product UI" subtitle="The shared intellect for human–agent teams · journey audit + 7 screens + reference">
          <DCSection id="audit" title="Coverage audit" subtitle="Every journey from the PRD mapped against what's designed — start here.">
            <DCArtboard id="audit-1" label="Coverage Audit" width={1600} height={1500}>
              <CoverageAudit />
            </DCArtboard>
          </DCSection>

          <DCSection id="shell" title="App shell + lists" subtitle="Core structure and the primary list views every team uses daily.">
            <DCArtboard id="s1" label="01 · App Shell (Light)" width={1440} height={900}>
              <Screen1_AppShell />
            </DCArtboard>
            <DCArtboard id="s2" label="02 · Doc List · Engineering" width={1440} height={900}>
              <Screen2_DocList />
            </DCArtboard>
            <DCArtboard id="s6" label="06 · Doc List · Dark mode" width={1440} height={900}>
              <Screen6_DocListDark />
            </DCArtboard>
          </DCSection>

          <DCSection id="editor" title="Authoring" subtitle="The doc editor — Aqli's centre of gravity. PRD mid-edit with metadata + right rail.">
            <DCArtboard id="s3" label="03 · Doc Editor" width={1440} height={1000}>
              <Screen3_Editor />
            </DCArtboard>
            <DCArtboard id="v1" label="08 · Doc Viewer (Approved)" width={1440} height={1000}>
              <DocViewer_Approved />
            </DCArtboard>
            <DCArtboard id="v2" label="09 · Doc Viewer + Request Review" width={1440} height={1000}>
              <DocViewer_RequestReview />
            </DCArtboard>
            <DCArtboard id="v3" label="10 · New Doc · Type Picker" width={1440} height={900}>
              <NewDoc_TypePicker />
            </DCArtboard>
            <DCArtboard id="v4" label="21 · Version history" width={1440} height={1100}>
              <VersionHistory />
            </DCArtboard>
          </DCSection>

          <DCSection id="agents" title="Human–agent workflow" subtitle="Review and discovery: the surfaces where humans and AI agents share authorship.">
            <DCArtboard id="s4" label="04 · Agent Review Queue" width={1440} height={1000}>
              <Screen4_ReviewQueue />
            </DCArtboard>
            <DCArtboard id="r1" label="11 · Notifications Panel" width={1440} height={900}>
              <NotificationsPanel />
            </DCArtboard>
            <DCArtboard id="r2" label="12 · Review Detail" width={1440} height={1100}>
              <ReviewDetail />
            </DCArtboard>
            <DCArtboard id="r3" label="13 · Review · Request Changes" width={1440} height={1100}>
              <ReviewDetail_RequestChanges />
            </DCArtboard>
            <DCArtboard id="r4" label="27 · Review · Approve" width={1440} height={1100}>
              <ReviewDetail_Approve />
            </DCArtboard>
            <DCArtboard id="r5" label="28 · Review · Reject" width={1440} height={1100}>
              <ReviewDetail_Reject />
            </DCArtboard>
            <DCArtboard id="s5" label="05 · Search · 'payout'" width={1440} height={900}>
              <Screen5_Search />
            </DCArtboard>
          </DCSection>

          <DCSection id="settings" title="Settings + API keys" subtitle="Closes J·09 — add another AI agent after onboarding. Shell, list, create, reveal.">
            <DCArtboard id="set1" label="Settings · Workspace" width={1440} height={900}>
              <Settings_General />
            </DCArtboard>
            <DCArtboard id="set2" label="Settings · API Keys" width={1440} height={900}>
              <Settings_Keys />
            </DCArtboard>
            <DCArtboard id="set3" label="Settings · New Key dialog" width={1440} height={900}>
              <Settings_Keys_NewDialog />
            </DCArtboard>
            <DCArtboard id="set4" label="Settings · Reveal Key (one-time)" width={1440} height={900}>
              <Settings_Keys_RevealDialog />
            </DCArtboard>
            <DCArtboard id="set5" label="16 · Settings · Members + Invite" width={1440} height={900}>
              <Settings_Members />
            </DCArtboard>
            <DCArtboard id="set6" label="19 · Settings · Integrations" width={1440} height={900}>
              <Settings_Integrations />
            </DCArtboard>
            <DCArtboard id="set7" label="20 · Linear · Configure" width={1440} height={1100}>
              <Settings_Integrations_Linear />
            </DCArtboard>
            <DCArtboard id="set7b" label="24 · Slack · Configure" width={1440} height={1100}>
              <Settings_Integrations_Slack />
            </DCArtboard>
            <DCArtboard id="set7c" label="25 · GitHub · Configure" width={1440} height={1100}>
              <Settings_Integrations_GitHub />
            </DCArtboard>
            <DCArtboard id="set7d" label="26 · Settings · Notifications" width={1440} height={1100}>
              <Settings_Notifications />
            </DCArtboard>
            <DCArtboard id="set8" label="23 · Settings · Agent activity" width={1440} height={1100}>
              <Settings_AgentActivity />
            </DCArtboard>
          </DCSection>

          <DCSection id="hygiene" title="Hygiene" subtitle="Stale-doc dashboard — quarterly cleanup, scoped by risk. Closes J·14.">
            <DCArtboard id="h1" label="22 · Stale dashboard" width={1440} height={1100}>
              <StaleDashboard />
            </DCArtboard>
          </DCSection>

          <DCSection id="team" title="Team & spaces" subtitle="Sign in, accept invites, create spaces — closes J·02, J·03, J·11.">
            <DCArtboard id="t1" label="14 · Sign in" width={1440} height={900}>
              <SignIn />
            </DCArtboard>
            <DCArtboard id="t2" label="15 · Invite landing" width={1440} height={900}>
              <InviteLanding />
            </DCArtboard>
            <DCArtboard id="t3" label="17 · Create Space dialog" width={1440} height={900}>
              <CreateSpaceDialog />
            </DCArtboard>
            <DCArtboard id="t4" label="18 · Empty Space" width={1440} height={900}>
              <EmptySpace />
            </DCArtboard>
          </DCSection>

          <DCSection id="onboarding" title="Onboarding" subtitle="Five steps from sign-up to first doc — no app shell yet, just a focused setup flow.">
            <DCArtboard id="ob1" label="Step 1 · Sign up" width={1440} height={900}>
              <Onboarding1_SignUp />
            </DCArtboard>
            <DCArtboard id="ob2" label="Step 2 · Name workspace" width={1440} height={900}>
              <Onboarding2_Workspace />
            </DCArtboard>
            <DCArtboard id="ob3" label="Step 3 · Choose spaces" width={1440} height={900}>
              <Onboarding3_Spaces />
            </DCArtboard>
            <DCArtboard id="ob4" label="Step 4 · Connect an agent" width={1440} height={900}>
              <Onboarding4_Agent />
            </DCArtboard>
            <DCArtboard id="ob5" label="Step 5 · You're set" width={1440} height={900}>
              <Onboarding5_Done />
            </DCArtboard>
          </DCSection>

          <DCSection id="reference" title="Reference" subtitle="Design tokens and component primitives — handoff-ready.">
            <DCArtboard id="ref-tokens" label="Colour tokens" width={1440} height={900}>
              <TokensRef />
            </DCArtboard>
            <DCArtboard id="ref-components" label="Component primitives" width={1440} height={900}>
              <ComponentsRef />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
